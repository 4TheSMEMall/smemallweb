[phases.setup]
nixPkgs = ["nodejs_20"]
cmds = ["corepack enable && corepack prepare pnpm@11.5.2 --activate"]

[phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "pnpm --filter @sme-mall/api db:generate",
  "pnpm --filter @sme-mall/api build"
]

[start]
cmd = "node apps/api/dist/server.js"
